name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy_primary.outputs.page_url || steps.deploy_retry.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deploy_primary
        continue-on-error: true
        uses: actions/deploy-pages@v5

      - name: Wait before retry
        if: steps.deploy_primary.outcome == 'failure'
        run: sleep 15

      - name: Retry deploy to GitHub Pages
        id: deploy_retry
        if: steps.deploy_primary.outcome == 'failure'
        uses: actions/deploy-pages@v5

      - name: Fail when deployment could not be completed
        if: steps.deploy_primary.outcome == 'failure' && steps.deploy_retry.outcome == 'failure'
        run: exit 1
